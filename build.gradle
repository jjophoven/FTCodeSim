tasks.register("runSimulatorServer", JavaExec) {
    dependsOn ":TeamCode:testDebugUnitTest"

    doFirst {
        def testTask = project(":TeamCode").tasks.named("testDebugUnitTest").get()
        classpath = testTask.classpath + testTask.testClassesDirs
    }

    mainClass = "org.junit.runner.JUnitCore"
    args "SimulateOpMode"

    debugOptions {
        enabled = true
        port = 5005
        server = true
        // Do not suspend the process waiting for a debugger by default; that leaves
        // the Gradle process blocked and can look like a "busy" daemon. Make it
        // non-suspending so runs don't hang waiting for an external debugger.
        suspend = false
    }
}